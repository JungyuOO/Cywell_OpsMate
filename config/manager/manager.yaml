apiVersion: apps/v1
kind: Deployment
metadata:
  name: cywell-opsmate-controller-manager
  namespace: cywell-opsmate-system
  labels:
    app.kubernetes.io/name: cywell-opsmate
    app.kubernetes.io/component: controller-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cywell-opsmate
      app.kubernetes.io/component: controller-manager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cywell-opsmate
        app.kubernetes.io/component: controller-manager
    spec:
      serviceAccountName: cywell-opsmate-controller-manager
      containers:
      - name: manager
        image: ghcr.io/jungyuoo/cywell-opsmate:v0.0.50
        imagePullPolicy: IfNotPresent
        command:
        - /manager
        env:
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
      securityContext:
        runAsNonRoot: true
