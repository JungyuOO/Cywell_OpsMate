apiVersion: opsmate.cywell.io/v1alpha1
kind: OpsMateConfig
metadata:
  name: sample
spec:
  lightspeed:
    apiBaseURL: https://lightspeed-app-server.openshift-lightspeed.svc:8443
    credentialsSecretRef: lightspeed-api-credentials
    defaultProvider: lightspeed
  database:
    type: postgres
    image: pgvector/pgvector:pg16
    dsnSecretRef: opsmate-postgres-dsn
    dsnSecretKey: dsn
    pgVectorMigrationApproved: false
    sharedBuffers: 128MB
    maxConnections: 100
  embedding:
    model: nomic-embed-text
    dimensions: 768
    requirePGVector: true
    retrievalMode: pgvector
    retrievalSlowMillis: 250
  console:
    enabled: true
    displayName: Cywell OpsMate
    adminTokenSecretRef: opsmate-admin-token
    adminTokenSecretKey: token
    adminUsers:
    - admin
    adminGroups:
    - cyops-admins
    adminAuthProxyEnabled: false
    adminAuthProxyImage: quay.io/openshift/origin-oauth-proxy:latest
    adminAuthProxyCookieSecretRef: opsmate-admin-oauth-cookie
  aiops:
    enabled: false
