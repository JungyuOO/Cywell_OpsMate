apiVersion: opsmate.cywell.io/v1alpha1
kind: OpsMateConfig
metadata:
  name: sample
spec:
  lightspeed:
    apiBaseURL: https://lightspeed-api.example.com
    credentialsSecretRef: lightspeed-api-credentials
    defaultProvider: openai
    defaultModel: gpt-4.1
  database:
    type: postgres
    image: pgvector/pgvector:pg16
    dsnSecretRef: opsmate-postgres-dsn
    dsnSecretKey: dsn
    sharedBuffers: 128MB
    maxConnections: 100
  embedding:
    model: nomic-embed-text
    dimensions: 768
    requirePGVector: true
    retrievalMode: pgvector
    retrievalSlowMillis: 250
  console:
    enabled: true
    displayName: Cywell OpsMate
  aiops:
    enabled: false
