apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: opsmateconfigs.opsmate.cywell.io
spec:
  group: opsmate.cywell.io
  names:
    kind: OpsMateConfig
    listKind: OpsMateConfigList
    plural: opsmateconfigs
    singular: opsmateconfig
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    schema:
      openAPIV3Schema:
        type: object
        required:
        - spec
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            type: object
            required:
            - lightspeed
            properties:
              lightspeed:
                type: object
                properties:
                  apiBaseURL:
                    type: string
                  credentialsSecretRef:
                    type: string
                  defaultProvider:
                    type: string
                  defaultModel:
                    type: string
              aiops:
                type: object
                properties:
                  enabled:
                    type: boolean
              rag:
                type: array
                items:
                  type: object
                  properties:
                    image:
                      type: string
                    indexPath:
                      type: string
                    indexID:
                      type: string
              embedding:
                type: object
                properties:
                  endpointURL:
                    type: string
                  model:
                    type: string
                  dimensions:
                    type: integer
                    format: int32
                  credentialsSecretRef:
                    type: string
                  credentialsSecretKey:
                    type: string
                  requirePGVector:
                    type: boolean
                  retrievalMode:
                    type: string
                  retrievalSlowMillis:
                    type: integer
                    format: int32
              database:
                type: object
                properties:
                  type:
                    type: string
                  image:
                    type: string
                  dsnSecretRef:
                    type: string
                  dsnSecretKey:
                    type: string
                  pgVectorMigrationApproved:
                    type: boolean
                  sharedBuffers:
                    type: string
                  maxConnections:
                    type: integer
                    format: int32
              console:
                type: object
                properties:
                  enabled:
                    type: boolean
                  displayName:
                    type: string
          status:
            type: object
            properties:
              overallStatus:
                type: string
              conditions:
                type: array
                items:
                  type: object
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  properties:
                    type:
                      type: string
                    status:
                      type: string
                    observedGeneration:
                      type: integer
                      format: int64
                    lastTransitionTime:
                      type: string
                      format: date-time
                    reason:
                      type: string
                    message:
                      type: string
    additionalPrinterColumns:
    - name: Status
      type: string
      jsonPath: .status.overallStatus
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
