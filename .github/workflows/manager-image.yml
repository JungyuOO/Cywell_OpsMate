name: manager-image

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/manager-image.yml"
      - "deploy/containerfiles/manager.Containerfile"
      - "cmd/manager/**"
      - "api/**"
      - "internal/controller/**"
      - "config/manager/**"
      - "go.mod"
      - "go.sum"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/jungyuoo/cywell-opsmate
  IMAGE_VERSION: v0.0.40

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build manager image
        run: docker build -f deploy/containerfiles/manager.Containerfile -t "${IMAGE_NAME}:${IMAGE_VERSION}" -t "${IMAGE_NAME}:latest" .

      - name: Push version tag
        run: docker push "${IMAGE_NAME}:${IMAGE_VERSION}"

      - name: Push latest tag
        run: docker push "${IMAGE_NAME}:latest"
