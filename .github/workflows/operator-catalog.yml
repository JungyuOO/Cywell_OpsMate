name: operator-catalog

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/operator-catalog.yml"
      - "deploy/containerfiles/catalog.Containerfile"
      - "deploy/olm/catalog/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/jungyuoo/cywell-opsmate-catalog
  IMAGE_VERSION: v0.0.42

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build catalog image
        run: docker build -f deploy/containerfiles/catalog.Containerfile -t "${IMAGE_NAME}:${IMAGE_VERSION}" -t "${IMAGE_NAME}:latest" .

      - name: Push version tag
        run: docker push "${IMAGE_NAME}:${IMAGE_VERSION}"

      - name: Push latest tag
        run: docker push "${IMAGE_NAME}:latest"
